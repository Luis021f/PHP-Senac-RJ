<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Turno de Estudo</title>
</head>
<body>

<script>
  let turno = prompt("Em que turno você estuda? (M - Matutino / V - Vespertino / N - Noturno)");

  if (turno === "M" || turno === "m") {
    alert("Bom Dia!");
  } else if (turno === "V" || turno === "v") {
    alert("Boa Tarde!");
  } else if (turno === "N" || turno === "n") {
    alert("Boa Noite!");
  } else {
    alert("Valor Inválido!");
  }
</script>

</body>
</html>
