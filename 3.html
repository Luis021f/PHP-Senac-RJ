<script>
// entrada
let n1 = parseInt(prompt("Digite o valor do 1º numero"));
let n2 = parseInt(prompt("Digite o valor do 2º numero"));
// processamento
let soma = n1 + n2 ;
let sub = n1 - n2 ;
let mult = n1 * n2 ;
let potencia = n1 ** n2 ;
// saida 
document.write("a soma foi :" + soma+ "<br/>");
document.write("a subtração foi :" + sub + "<br/>");
document.write("a multiplicação foi :" + mult+ "<br/>");
document.write("a potencia de "+n1 + "elevado a" + n2 +" =" + potencia+"<br/>");

</script>
